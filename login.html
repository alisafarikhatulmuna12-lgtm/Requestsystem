<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Request & Approval System</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{
            font-family:'Inter',sans-serif;
            background:linear-gradient(135deg, #1a2744 0%, #1e3a6e 100%);
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:20px;
        }
        .login-container{
            background:#fff;
            border-radius:16px;
            box-shadow:0 25px 80px rgba(0,0,0,.3);
            width:100%;
            max-width:420px;
            overflow:hidden;
        }
        .login-header{
            background:linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            padding:32px 28px;
            text-align:center;
            color:#fff;
        }
        .login-header .logo{
            width:56px;height:56px;
            background:rgba(255,255,255,.2);
            border-radius:14px;
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:24px;
            margin:0 auto 16px;
        }
        .login-header h1{
            font-size:20px;
            font-weight:700;
            margin-bottom:4px;
        }
        .login-header p{
            font-size:13px;
            opacity:.85;
        }
        .login-body{padding:28px;}
        .role-tabs{
            display:flex;
            gap:4px;
            background:#f3f4f6;
            padding:4px;
            border-radius:10px;
            margin-bottom:24px;
        }
        .role-tab{
            flex:1;
            padding:10px;
            border-radius:8px;
            font-size:12.5px;
            font-weight:600;
            text-align:center;
            cursor:pointer;
            transition:.15s;
            color:#6b7280;
            border:none;
            background:transparent;
            font-family:inherit;
        }
        .role-tab:hover{color:#111827;}
        .role-tab.active{
            background:#fff;
            color:#2563eb;
            box-shadow:0 1px 3px rgba(0,0,0,.1);
        }
        .form-group{margin-bottom:18px;}
        .form-group label{
            display:block;
            font-size:12px;
            font-weight:600;
            color:#374151;
            margin-bottom:6px;
        }
        .form-group input{
            width:100%;
            padding:11px 14px;
            border:1.5px solid #d1d5db;
            border-radius:8px;
            font-size:13px;
            font-family:inherit;
            outline:none;
            transition:.15s;
        }
        .form-group input:focus{
            border-color:#2563eb;
            box-shadow:0 0 0 3px rgba(37,99,235,.1);
        }
        .login-btn{
            width:100%;
            padding:12px;
            background:linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            color:#fff;
            border:none;
            border-radius:8px;
            font-size:14px;
            font-weight:700;
            cursor:pointer;
            transition:.15s;
            font-family:inherit;
            margin-top:4px;
        }
        .login-btn:hover{
            transform:translateY(-1px);
            box-shadow:0 8px 20px rgba(37,99,235,.3);
        }
        .login-btn:disabled{
            opacity:0.6;
            cursor:not-allowed;
            transform:none;
        }
        .login-info{
            margin-top:20px;
            padding:14px;
            background:#f0f9ff;
            border-radius:8px;
            border:1px solid #bae6fd;
        }
        .login-info-title{
            font-size:12px;
            font-weight:700;
            color:#0369a1;
            margin-bottom:6px;
            display:flex;
            align-items:center;
            gap:6px;
        }
        .login-info-item{
            font-size:12px;
            color:#0c4a6e;
            padding:3px 0;
            display:flex;
            justify-content:space-between;
        }
        .login-info-item code{
            background:#fff;
            padding:2px 8px;
            border-radius:4px;
            font-size:11px;
            border:1px solid #bae6fd;
        }
        .error-msg{
            background:#fee2e2;
            color:#991b1b;
            padding:10px 14px;
            border-radius:8px;
            font-size:12.5px;
            font-weight:500;
            margin-bottom:16px;
            display:none;
            align-items:center;
            gap:8px;
        }
        .error-msg.show{display:flex;}
        .success-msg{
            background:#d1fae5;
            color:#065f46;
            padding:10px 14px;
            border-radius:8px;
            font-size:12.5px;
            font-weight:500;
            margin-bottom:16px;
            display:none;
            align-items:center;
            gap:8px;
        }
        .success-msg.show{display:flex;}
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="logo">📋</div>
            <h1>Request & Approval System</h1>
            <p>Sistem Manajemen Permintaan Karyawan</p>
        </div>
        <div class="login-body">
            <!-- Role Selection -->
            <div class="role-tabs">
                <button class="role-tab active" onclick="setRole('karyawan', this)">👤 Karyawan</button>
                <button class="role-tab" onclick="setRole('atasan', this)">👔 Atasan</button>
                <button class="role-tab" onclick="setRole('admin', this)">🛡️ Admin</button>
            </div>

            <!-- Messages -->
            <div class="error-msg" id="errorMsg">
                <i class="fas fa-exclamation-circle"></i>
                <span id="errorText">Email atau password salah</span>
            </div>
            <div class="success-msg" id="successMsg">
                <i class="fas fa-check-circle"></i>
                <span id="successText">Login berhasil!</span>
            </div>

            <!-- Login Form -->
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Email <span style="color:#ef4444">*</span></label>
                    <input type="email" id="email" placeholder="Masukkan email" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label>Password <span style="color:#ef4444">*</span></label>
                    <input type="password" id="password" placeholder="Masukkan password" required autocomplete="current-password">
                </div>
                <button type="submit" class="login-btn" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i> Masuk
                </button>
            </form>

            <!-- Demo Accounts -->
            <div class="login-info">
                <div class="login-info-title">
                    <i class="fas fa-info-circle"></i> Akun Demo
                </div>
                <div id="demoAccounts">
                    <div class="login-info-item">
                        <span>Asna (Karyawan)</span>
                        <code>asna@co.com / 123</code>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let selectedRole = 'karyawan';

        const DEMO_ACCOUNTS = {
            karyawan: [
                {name:'Asna Pratiwi', email:'asna@co.com', password:'123', dept:'HRD'},
                {name:'Dika Rahmat', email:'dika@co.com', password:'123', dept:'Finance'},
                {name:'Putri Ayu', email:'putri@co.com', password:'123', dept:'Marketing'},
            ],
            atasan: [
                {name:'Rudi Santoso', email:'rudi@co.com', password:'123', dept:'IT'},
                {name:'Sari Dewi', email:'sari@co.com', password:'123', dept:'Ops'},
            ],
            admin: [
                {name:'Administrator', email:'admin@co.com', password:'admin', dept:'All'},
            ]
        };

        function setRole(role, btn) {
            selectedRole = role;
            document.querySelectorAll('.role-tab').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
            
            const container = document.getElementById('demoAccounts');
            const accounts = DEMO_ACCOUNTS[role];
            container.innerHTML = accounts.map(a => `
                <div class="login-info-item">
                    <span>${a.name} (${role.charAt(0).toUpperCase() + role.slice(1)})</span>
                    <code>${a.email} / ${a.password}</code>
                </div>
            `).join('');
            
            // Clear messages
            document.getElementById('errorMsg').classList.remove('show');
            document.getElementById('successMsg').classList.remove('show');
        }

        function handleLogin(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim().toLowerCase();
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            const errorText = document.getElementById('errorText');
            const successMsg = document.getElementById('successMsg');
            const loginBtn = document.getElementById('loginBtn');

            // Reset messages
            errorMsg.classList.remove('show');
            successMsg.classList.remove('show');

            // Validation
            if (!email || !password) {
                errorText.textContent = 'Email dan password wajib diisi';
                errorMsg.classList.add('show');
                return;
            }

            // Find user in selected role
            const accounts = DEMO_ACCOUNTS[selectedRole];
            console.log('Trying login:', {role: selectedRole, email, password, accounts});
            
            const user = accounts.find(a => 
                a.email.toLowerCase() === email && 
                a.password === password
            );

            if (!user) {
                errorText.textContent = `Email atau password salah untuk role ${selectedRole}`;
                errorMsg.classList.add('show');
                return;
            }

            // Success - save session
            const session = {
                role: selectedRole,
                name: user.name,
                email: user.email,
                dept: user.dept,
                loginTime: new Date().toISOString()
            };
            
            console.log('Login success:', session);
            localStorage.setItem('ras_session', JSON.stringify(session));
            
            // Show success
            successMsg.classList.add('show');
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Memuat...';
            
            // Redirect after short delay
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 800);
        }

        // Check if already logged in
        window.addEventListener('DOMContentLoaded', () => {
            const session = localStorage.getItem('ras_session');
            if (session) {
                // Already logged in, redirect to app
                window.location.replace('index.html');
                return;
            }
            // Initialize demo accounts display
            setRole('karyawan', document.querySelector('.role-tab.active'));
        });
    </script>
</body>
</html>
